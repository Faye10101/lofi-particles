<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>粒子流</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #FAFAF8;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  font-family: 'Courier New', monospace;
}

canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

/* ── 顶部区域：时钟 + 日期 + 番茄钟 ── */
#top {
  position: fixed;
  top: 38px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 10;
  user-select: none;
}

#time-display {
  font-size: 82px;
  font-weight: 800;
  color: rgba(0,0,0,0.92);
  letter-spacing: 6px;
  line-height: 1;
}

#date-display {
  font-size: 20px;
  font-weight: 700;
  color: rgba(0,0,0,0.78);
  letter-spacing: 3px;
  margin-top: 12px;
}

/* ── 番茄钟 ── */
#pomo {
  margin-top: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

#pomo-mode {
  font-size: 18px;
  font-weight: 700;
  color: rgba(0,0,0,0.7);
  letter-spacing: 4px;
  margin-bottom: 10px;
  transition: color 0.5s;
}

#pomo-row {
  display: flex;
  align-items: center;
  gap: 18px;
}

#pomo-count {
  font-size: 52px;
  font-weight: 800;
  color: rgba(0,0,0,0.88);
  letter-spacing: 4px;
  min-width: 140px;
  transition: color 0.5s;
}

.pbtn {
  background: none;
  border: 2px solid rgba(0,0,0,0.35);
  color: rgba(0,0,0,0.75);
  font-size: 18px;
  font-weight: 700;
  width: 42px; height: 42px;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.pbtn:hover {
  border-color: rgba(0,0,0,0.7);
  color: rgba(0,0,0,0.95);
  background: rgba(0,0,0,0.06);
}

/* 进度条 */
#pomo-track {
  width: 180px; height: 1.5px;
  background: rgba(0,0,0,0.07);
  margin: 12px 0 9px;
  border-radius: 1px;
  overflow: hidden;
}
#pomo-bar {
  height: 100%;
  width: 100%;
  background: rgba(180,70,30,0.45);
  border-radius: 1px;
  transition: width 1s linear, background 0.6s;
}

/* 会话小点 */
#pomo-dots {
  display: flex;
  gap: 7px;
}
.pdot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(0,0,0,0.1);
  transition: background 0.3s;
}
.pdot.done { background: rgba(0,0,0,0.52); }

/* ── 底部控制区 ── */
#bottom {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  z-index: 10;
}

/* 随机 / 关闭 按钮 */
#quick-btns {
  display: flex;
  gap: 14px;
}

.qbtn {
  background: rgba(0,0,0,0.07);
  border: 2px solid rgba(0,0,0,0.3);
  color: rgba(0,0,0,0.82);
  font-family: 'Courier New', monospace;
  font-size: 15px;
  font-weight: 700;
  padding: 8px 22px;
  border-radius: 100px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.qbtn:hover {
  background: rgba(0,0,0,0.13);
  border-color: rgba(0,0,0,0.65);
  color: rgba(0,0,0,0.95);
}

/* 声音滑块 */
#ui {
  display: flex;
  gap: 28px;
  align-items: flex-end;
}

.track {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.sw {
  position: relative;
  width: 28px; height: 96px;
  display: flex; align-items: center; justify-content: center;
}

.sb {
  position: absolute;
  left: 50%; top: 0;
  transform: translateX(-50%);
  width: 2px; height: 100%;
  background: rgba(0,0,0,0.07);
  border-radius: 2px;
}

.sf {
  position: absolute;
  left: 50%; bottom: 0;
  transform: translateX(-50%);
  width: 2px; height: 0%;
  border-radius: 2px;
  transition: height 0.05s ease;
  pointer-events: none;
}

.sf-rain    { background: linear-gradient(to top, #3A7BA0, #8BBDD8); }
.sf-thunder { background: linear-gradient(to top, #A08010, #D4B830); }
.sf-wind    { background: linear-gradient(to top, #6080A0, #A0B8C8); }
.sf-stream  { background: linear-gradient(to top, #228855, #60BBA0); }
.sf-fire    { background: linear-gradient(to top, #BB1800, #FF7700, #FFD000); }
.sf-ocean   { background: linear-gradient(to top, #103C60, #1E6A9A); }

input[type=range] {
  position: absolute;
  -webkit-appearance: none;
  appearance: none;
  width: 96px; height: 28px;
  background: transparent;
  cursor: pointer;
  transform: translate(-50%, -50%) rotate(-90deg);
  top: 50%; left: 50%;
  z-index: 1;
}
input[type=range]::-webkit-slider-runnable-track { background: transparent; }
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: rgba(0,0,0,0.65);
  cursor: pointer;
  transition: background 0.15s;
}
input[type=range]:hover::-webkit-slider-thumb { background: rgba(0,0,0,0.88); }

/* 标签：加大加深加粗 */
.track label {
  color: rgba(0,0,0,0.85);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  user-select: none;
}

#hint {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(0,0,0,0.1);
  font-size: 11px;
  letter-spacing: 5px;
  pointer-events: none;
  transition: opacity 1.5s ease;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- 顶部：时钟 + 日期 + 番茄钟 -->
<div id="top">
  <div id="time-display">00:00:00</div>
  <div id="date-display">----年--月--日　星期-</div>

  <div id="pomo">
    <div id="pomo-mode">专注</div>
    <div id="pomo-row">
      <div id="pomo-count">25:00</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="pbtn" id="pomo-play" title="开始/暂停">▶</button>
        <button class="pbtn" id="pomo-reset" title="重置">↺</button>
      </div>
    </div>
    <div id="pomo-track"><div id="pomo-bar"></div></div>
    <div id="pomo-dots">
      <div class="pdot" id="d0"></div>
      <div class="pdot" id="d1"></div>
      <div class="pdot" id="d2"></div>
      <div class="pdot" id="d3"></div>
    </div>
  </div>
</div>

<!-- 底部：快捷按钮 + 声音滑块 -->
<div id="bottom">
<div id="quick-btns">
  <button class="qbtn" id="btn-random">✦ 随机</button>
  <button class="qbtn" id="btn-clear">✕ 关闭全部</button>
</div>
<div id="ui">
  <div class="track">
    <div class="sw">
      <div class="sb"></div><div class="sf sf-rain" id="fr"></div>
      <input type="range" id="s-rain" min="0" max="1" step="0.01" value="0">
    </div>
    <label>雨</label>
  </div>
  <div class="track">
    <div class="sw">
      <div class="sb"></div><div class="sf sf-thunder" id="ft"></div>
      <input type="range" id="s-thunder" min="0" max="1" step="0.01" value="0">
    </div>
    <label>雷</label>
  </div>
  <div class="track">
    <div class="sw">
      <div class="sb"></div><div class="sf sf-wind" id="fw"></div>
      <input type="range" id="s-wind" min="0" max="1" step="0.01" value="0">
    </div>
    <label>风</label>
  </div>
  <div class="track">
    <div class="sw">
      <div class="sb"></div><div class="sf sf-stream" id="fst"></div>
      <input type="range" id="s-stream" min="0" max="1" step="0.01" value="0">
    </div>
    <label>溪流</label>
  </div>
  <div class="track">
    <div class="sw">
      <div class="sb"></div><div class="sf sf-fire" id="ff"></div>
      <input type="range" id="s-fire" min="0" max="1" step="0.01" value="0">
    </div>
    <label>火焰</label>
  </div>
  <div class="track">
    <div class="sw">
      <div class="sb"></div><div class="sf sf-ocean" id="fo"></div>
      <input type="range" id="s-ocean" min="0" max="1" step="0.01" value="0">
    </div>
    <label>海洋</label>
  </div>
</div>
</div>

<div id="hint">拖动滑块开始</div>

<script>
'use strict';

// ════════════════════════════════════════════
//  画布
// ════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  gPat = null;
});

// ════════════════════════════════════════════
//  Grain 颗粒感
// ════════════════════════════════════════════
const GS = 256;
const gc = document.createElement('canvas');
gc.width = gc.height = GS;
const gx = gc.getContext('2d');
let gPat = null, gTick = 0;

function mkGrain() {
  const id = gx.createImageData(GS, GS);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() * 255 | 0;
    d[i] = d[i+1] = d[i+2] = v; d[i+3] = 12;
  }
  gx.putImageData(id, 0, 0);
  gPat = ctx.createPattern(gc, 'repeat');
}
mkGrain();

// ════════════════════════════════════════════
//  工具
// ════════════════════════════════════════════
const lerp  = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const rnd   = () => Math.random();
const rndN  = (lo, hi) => lo + rnd() * (hi - lo);
const rndOf = arr => arr[Math.floor(rnd() * arr.length)];
const ri    = v => Math.round(v);

// ════════════════════════════════════════════
//  声音定义
// ════════════════════════════════════════════
const SDEFS = [
  { key: 'rain',    label: '雨',   fillId: 'fr',  maxP: 130, rate: 5.0 },
  { key: 'thunder', label: '雷',   fillId: 'ft',  maxP: 45,  rate: 0.7 },
  { key: 'wind',    label: '风',   fillId: 'fw',  maxP: 90,  rate: 2.5 },
  { key: 'stream',  label: '溪流', fillId: 'fst', maxP: 110, rate: 2.5 },
  { key: 'fire',    label: '火焰', fillId: 'ff',  maxP: 175, rate: 6.0 },
  { key: 'ocean',   label: '海洋', fillId: 'fo',  maxP: 90,  rate: 0.8 },
];

const vols  = Object.fromEntries(SDEFS.map(d => [d.key, 0]));
const pools = Object.fromEntries(SDEFS.map(d => [d.key, []]));

// ════════════════════════════════════════════
//  火焰发射源
// ════════════════════════════════════════════
let fX = null, fY = null, fTargX = null;

function ensureFire() {
  if (fX === null) {
    fX = W * 0.5; fY = H * 0.72;
    fTargX = W * 0.35 + rnd() * W * 0.3;
  }
}
function driftFire() {
  ensureFire();
  fX += (fTargX - fX) * 0.003;
  if (Math.abs(fX - fTargX) < 10) fTargX = W * 0.25 + rnd() * W * 0.5;
}

// ════════════════════════════════════════════
//  颜色表
// ════════════════════════════════════════════
const PAL = {
  rain:   [[62,118,162],[88,148,192],[45,98,150],[80,138,182]],
  thunder:[[192,170,8],[215,195,22],[170,148,5],[205,180,15]],
  wind:   [[115,138,158],[135,158,176],[98,120,142],[125,148,168]],
  stream: [[50,155,118],[75,188,142],[36,128,98],[62,166,132]],
  ocean:  [[18,70,108],[36,118,158],[55,175,165],[14,50,86],[60,148,180]],
};

// ════════════════════════════════════════════
//  粒子生成（稍微放大）
// ════════════════════════════════════════════
function spawn(key) {
  const vol = vols[key];
  const p = { key, age:0, maxAge:1, alive:true, r:0, g:0, b:0, alpha:1, drawAlpha:0, w:1, h:1, x:0, y:0, vx:0, vy:0 };

  switch (key) {

    case 'rain': {
      p.x = rnd() * W;
      p.y = rnd() < 0.85 ? -5 : rnd() * H * 0.2;
      p.vx = rndN(-0.25, 0.25);
      p.vy = rndN(2.5, 4.2) + vol * 4.0;
      p.w = 1;
      p.h = vol > 0.65 ? 4 : 3;       // ↑ 加长水滴
      [p.r, p.g, p.b] = rndOf(PAL.rain);
      p.alpha = rndN(0.25, 0.55);
      p.maxAge = Math.ceil((H + 10) / p.vy) + 5;
      break;
    }

    case 'thunder': {
      p.x = rnd() * W; p.y = rnd() * H;
      const spd = rndN(4, 9);
      const ang = rnd() * Math.PI * 2;
      p.vx = Math.cos(ang) * spd; p.vy = Math.sin(ang) * spd;
      p.w = p.h = rnd() < 0.45 ? 2 : 3;   // ↑ 2-3px
      [p.r, p.g, p.b] = rndOf(PAL.thunder);
      p.alpha = rndN(0.5, 1.0);
      p.maxAge = rndN(10, 38);
      break;
    }

    case 'wind': {
      p.fromRight = rnd() < 0.25;
      p.x = p.fromRight ? W + 3 : -3;
      p.y = rnd() * H;
      const spd = rndN(1.0, 1.8) + vol * 1.8;
      p.vx = p.fromRight ? -spd : spd;
      p.wobOff = rnd() * Math.PI * 2;
      p.wobAmp = rndN(0.3, 0.7);
      p.wobFreq = rndN(0.012, 0.028);
      p.w = p.h = rnd() < 0.5 ? 1 : 2;    // ↑ 1-2px
      [p.r, p.g, p.b] = rndOf(PAL.wind);
      p.alpha = rndN(0.12, 0.30);
      p.maxAge = 9999;
      break;
    }

    case 'stream': {
      p.x = rnd() * W; p.y = rnd() * H * 0.2;
      const spd = rndN(0.55, 1.35);
      p.vx = rndN(-0.35, 0.35) * spd;
      p.vy = spd * 0.6 + 0.2;
      p.wobOff = rnd() * Math.PI * 2;
      p.wobFreq = rndN(0.025, 0.055);
      p.wobAmp = rndN(0.4, 1.0);
      p.w = p.h = rnd() < 0.55 ? 2 : 3;   // ↑ 2-3px
      [p.r, p.g, p.b] = rndOf(PAL.stream);
      p.alpha = rndN(0.25, 0.55);
      p.maxAge = rndN(180, 400);
      break;
    }

    case 'fire': {
      ensureFire();
      p.isSpark = rnd() < 0.065;
      p.x = fX + rndN(-55, 55);
      p.y = fY + rndN(0, 16);
      if (p.isSpark) {
        const ang = -Math.PI / 2 + rndN(-0.65, 0.65);
        const spd = rndN(2.5, 5.5);
        p.vx = Math.cos(ang) * spd; p.vy = Math.sin(ang) * spd;
        p.grav = 0.08;
      } else {
        p.vx = rndN(-0.55, 0.55);
        p.vy = -(rndN(1.2, 2.8) + vol * 2.0);
        p.grav = 0;
      }
      p.turbX = 0;
      p.w = p.h = p.isSpark ? 1 : (rnd() < 0.38 ? 3 : 2);  // ↑ 2-3px
      p.alpha = rndN(0.6, 1.0);
      p.maxAge = p.isSpark ? rndN(14, 30) : rndN(45, 88) + vol * 55;
      break;
    }

    case 'ocean': {
      p.x = rnd() * W;
      p.y = H * 0.2 + rnd() * H * 0.62;
      p.wOff  = rnd() * Math.PI * 2;
      p.wFreq = rndN(0.003, 0.009);
      p.wAmp  = rndN(0.35, 0.85);
      p.bvx   = rndN(-0.45, 0.45);
      p.vy    = rndN(-0.12, 0.12);
      p.w = p.h = rnd() < 0.48 ? 2 : (rnd() < 0.6 ? 3 : 4);  // ↑ 2-4px
      [p.r, p.g, p.b] = rndOf(PAL.ocean);
      p.alpha = rndN(0.18, 0.52);
      p.maxAge = rndN(320, 720);
      break;
    }
  }
  return p;
}

// ════════════════════════════════════════════
//  粒子更新
// ════════════════════════════════════════════
function update(p) {
  p.age++;
  const t  = clamp(p.age / p.maxAge, 0, 1);
  const fi = t < 0.08 ? t / 0.08 : 1;
  const fo = t > 0.82 ? (1 - t) / 0.18 : 1;

  switch (p.key) {
    case 'rain':
      p.x += p.vx; p.y += p.vy;
      p.drawAlpha = p.alpha;
      if (p.y > H + 6) p.alive = false;
      break;

    case 'thunder':
      p.vx *= 0.94; p.vy *= 0.94;
      p.x += p.vx; p.y += p.vy;
      p.drawAlpha = p.alpha * (1 - t);
      if (t >= 1) p.alive = false;
      break;

    case 'wind': {
      p.y += Math.sin(p.age * p.wobFreq + p.wobOff) * p.wobAmp;
      p.x += p.vx;
      const ef = clamp(Math.min(Math.abs(p.x) / 65, Math.abs(W - p.x) / 65), 0, 1);
      p.drawAlpha = p.alpha * ef;
      if (p.x < -14 || p.x > W + 14) p.alive = false;
      break;
    }

    case 'stream':
      p.x += p.vx + Math.sin(p.age * p.wobFreq + p.wobOff) * p.wobAmp;
      p.y += p.vy;
      p.drawAlpha = p.alpha * fi * fo;
      if (t >= 1 || p.x < -14 || p.x > W + 14 || p.y > H + 14) p.alive = false;
      break;

    case 'fire':
      p.turbX += rndN(-0.24, 0.24); p.turbX *= 0.88;
      p.vx += p.turbX * 0.13; p.vx *= 0.975;
      p.vy += p.grav;
      p.x += p.vx; p.y += p.vy;
      // 颜色：深红 → 橙 → 黄
      if (t < 0.3) {
        const s = t / 0.3;
        p.r = lerp(185, 238, s)|0; p.g = lerp(15, 92, s)|0; p.b = 0;
      } else if (t < 0.72) {
        const s = (t - 0.3) / 0.42;
        p.r = lerp(238, 255, s)|0; p.g = lerp(92, 210, s)|0; p.b = 0;
      } else {
        const s = (t - 0.72) / 0.28;
        p.r = 255; p.g = lerp(210, 248, s)|0; p.b = lerp(0, 80, s)|0;
      }
      p.drawAlpha = p.alpha * fi * (t > 0.72 ? (1 - t) / 0.28 : 1);
      if (t >= 1 || p.y < -18) p.alive = false;
      break;

    case 'ocean':
      p.vx = p.bvx + Math.sin(p.age * p.wFreq + p.wOff) * p.wAmp;
      p.x += p.vx; p.y += p.vy;
      if (p.x < -6) p.x = W + 6;
      if (p.x > W + 6) p.x = -6;
      p.drawAlpha = p.alpha * fi * fo;
      if (t >= 1) p.alive = false;
      break;
  }
}

function draw(p) {
  if (p.drawAlpha < 0.005) return;
  ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.drawAlpha.toFixed(3)})`;
  ctx.fillRect(ri(p.x), ri(p.y), p.w, p.h);
}

// ════════════════════════════════════════════
//  粒子池调度
// ════════════════════════════════════════════
function tickPool(key, rate, maxP) {
  const vol = vols[key];
  const pool = pools[key];
  if (vol > 0) {
    let need = Math.ceil(vol * rate);
    for (let i = 0; i < pool.length && need > 0; i++) {
      if (!pool[i].alive) { Object.assign(pool[i], spawn(key)); need--; }
    }
    while (need > 0 && pool.length < maxP) { pool.push(spawn(key)); need--; }
  }
  for (const p of pool) {
    if (p.alive) { update(p); if (p.alive) draw(p); }
  }
}

// ════════════════════════════════════════════
//  Web Audio
// ════════════════════════════════════════════
let ac = null, audioReady = false;
const gains = {};

function mkSrc() {
  const buf = ac.createBuffer(1, ac.sampleRate * 4, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = rnd() * 2 - 1;
  const src = ac.createBufferSource();
  src.buffer = buf; src.loop = true;
  return src;
}

function initAudio() {
  if (audioReady) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();

  // 雨
  { const s=mkSrc(); const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=3200; bp.Q.value=0.5;
    const g=ac.createGain(); g.gain.value=0; s.connect(bp); bp.connect(g); g.connect(ac.destination); s.start();
    gains.rain={g,maxV:0.5}; }

  // 雷
  { const s=mkSrc(); const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=80;
    const g=ac.createGain(); g.gain.value=0; s.connect(lp); lp.connect(g); g.connect(ac.destination); s.start();
    gains.thunder={g,maxV:1.0}; }

  // 风
  { const s=mkSrc(); const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=500;
    const lfo=ac.createOscillator(); lfo.frequency.value=0.15;
    const lg=ac.createGain(); lg.gain.value=300; lfo.connect(lg); lg.connect(lp.frequency); lfo.start();
    const g=ac.createGain(); g.gain.value=0; s.connect(lp); lp.connect(g); g.connect(ac.destination); s.start();
    gains.wind={g,maxV:0.45}; }

  // 溪流
  { const s=mkSrc(); const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1100; bp.Q.value=0.3;
    const hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=400;
    const g=ac.createGain(); g.gain.value=0; s.connect(bp); bp.connect(hp); hp.connect(g); g.connect(ac.destination); s.start();
    gains.stream={g,maxV:0.55}; }

  // 火焰（高频噼啪 + 低频隆隆）
  { const s1=mkSrc(); const hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2800;
    const g1=ac.createGain(); g1.gain.value=0; s1.connect(hp); hp.connect(g1); g1.connect(ac.destination); s1.start();
    const s2=mkSrc(); const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=130;
    const g2=ac.createGain(); g2.gain.value=0; s2.connect(lp); lp.connect(g2); g2.connect(ac.destination); s2.start();
    gains.fire={g:g1,g2,maxV:0.38,maxV2:0.55}; }

  // 海洋（超慢 LFO 涌浪感）
  // ⚠️ LFO 必须调制独立的 swellG，而非直接调制 masterG。
  // 否则 masterG.gain=0 时 LFO 仍叠加正值，导致"关闭全部"后还有残声。
  { const s=mkSrc(); const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=270;
    const pk=ac.createBiquadFilter(); pk.type='peaking'; pk.frequency.value=90; pk.gain.value=7; pk.Q.value=0.8;
    // swellG：LFO 在此节点产生涌浪感（基础增益 1.0，±0.18 波动）
    const swellG=ac.createGain(); swellG.gain.value=1.0;
    const lfo=ac.createOscillator(); lfo.frequency.value=0.06;
    const lg=ac.createGain(); lg.gain.value=0.18; lfo.connect(lg); lg.connect(swellG.gain); lfo.start();
    // masterG：滑块控制的总音量，与 LFO 完全独立，设为 0 即真正静音
    const masterG=ac.createGain(); masterG.gain.value=0;
    s.connect(lp); lp.connect(pk); pk.connect(swellG); swellG.connect(masterG); masterG.connect(ac.destination); s.start();
    gains.ocean={g:masterG,maxV:0.55}; }

  audioReady = true;
}

function setGain(key, vol) {
  if (!audioReady || !gains[key]) return;
  const gn = gains[key], t = ac.currentTime;
  gn.g.gain.setTargetAtTime(vol * gn.maxV, t, 0.12);
  if (gn.g2) gn.g2.gain.setTargetAtTime(vol * gn.maxV2, t, 0.12);
}

// 番茄钟结束提示音（三短音）
function playDone() {
  if (!ac) return;
  [0, 0.18, 0.36].forEach(offset => {
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.value = 660;
    g.gain.setValueAtTime(0.22, ac.currentTime + offset);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + offset + 0.15);
    osc.start(ac.currentTime + offset);
    osc.stop(ac.currentTime + offset + 0.15);
  });
}

// ════════════════════════════════════════════
//  时钟
// ════════════════════════════════════════════
const DAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

function updateClock() {
  const now = new Date();
  const hh  = String(now.getHours()).padStart(2, '0');
  const mm  = String(now.getMinutes()).padStart(2, '0');
  const ss  = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('time-display').textContent = `${hh}:${mm}:${ss}`;

  const mo = now.getMonth() + 1;
  document.getElementById('date-display').textContent =
    `${now.getFullYear()}年${mo}月${now.getDate()}日　${DAYS[now.getDay()]}`;
}
updateClock();
setInterval(updateClock, 1000);

// ════════════════════════════════════════════
//  番茄钟
// ════════════════════════════════════════════
const POMO = {
  WORK:  25 * 60,
  SHORT:  5 * 60,
  LONG:  15 * 60,
};

// 模式对应的进度条颜色
const POMO_BAR_COLOR = {
  work:  'rgba(180,70,30,0.45)',
  short: 'rgba(40,120,180,0.4)',
  long:  'rgba(40,160,100,0.4)',
};
const POMO_LABEL = { work: '专注', short: '短休息', long: '长休息' };

let pomo = {
  running:  false,
  mode:     'work',
  total:    POMO.WORK,
  left:     POMO.WORK,
  sessions: 0,
  timer:    null,
};

function fmt(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function pomoUpdate() {
  document.getElementById('pomo-count').textContent = fmt(pomo.left);
  document.getElementById('pomo-mode').textContent  = POMO_LABEL[pomo.mode];
  document.getElementById('pomo-play').textContent  = pomo.running ? '⏸' : '▶';

  // 进度条
  const bar = document.getElementById('pomo-bar');
  bar.style.width = (pomo.left / pomo.total * 100) + '%';
  bar.style.background = POMO_BAR_COLOR[pomo.mode];

  // 会话小点（每完成一个 work 亮一个）
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).className =
      'pdot' + (i < (pomo.sessions % 4) ? ' done' : '');
  }
}

function pomoTick() {
  pomo.left--;
  if (pomo.left <= 0) {
    if (ac) playDone();
    if (pomo.mode === 'work') {
      pomo.sessions++;
      if (pomo.sessions % 4 === 0) {
        pomo.mode = 'long';  pomo.total = POMO.LONG;
      } else {
        pomo.mode = 'short'; pomo.total = POMO.SHORT;
      }
    } else {
      pomo.mode  = 'work'; pomo.total = POMO.WORK;
    }
    pomo.left = pomo.total;
  }
  pomoUpdate();
}

function pomoPlay() {
  if (pomo.running) {
    pomo.running = false;
    clearInterval(pomo.timer);
  } else {
    // 确保音频上下文已创建（番茄钟提示音需要）
    if (!ac) {
      ac = new (window.AudioContext || window.webkitAudioContext)();
      audioReady = false; // 保留原有音频初始化状态
    }
    pomo.running = true;
    pomo.timer = setInterval(pomoTick, 1000);
  }
  pomoUpdate();
}

function pomoReset() {
  pomo.running = false;
  clearInterval(pomo.timer);
  pomo.mode = 'work'; pomo.total = POMO.WORK; pomo.left = POMO.WORK; pomo.sessions = 0;
  pomoUpdate();
}

document.getElementById('pomo-play').addEventListener('click', pomoPlay);
document.getElementById('pomo-reset').addEventListener('click', pomoReset);
pomoUpdate();

// ════════════════════════════════════════════
//  滑块
// ════════════════════════════════════════════
let hintGone = false;

SDEFS.forEach(def => {
  const slider = document.getElementById('s-' + def.key);
  const fill   = document.getElementById(def.fillId);
  slider.addEventListener('input', () => {
    if (!hintGone) { hintGone = true; document.getElementById('hint').style.opacity = '0'; }
    initAudio(); ac.resume();
    const v = parseFloat(slider.value);
    vols[def.key] = v;
    fill.style.height = (v * 100) + '%';
    setGain(def.key, v);
  });
});

// ════════════════════════════════════════════
//  快捷按钮：随机 / 关闭全部
// ════════════════════════════════════════════
function applyVolume(key, v) {
  v = Math.round(v * 100) / 100;
  const slider = document.getElementById('s-' + key);
  const fill   = document.getElementById(SDEFS.find(d => d.key === key).fillId);
  slider.value = v;
  vols[key] = v;
  fill.style.height = (v * 100) + '%';
  setGain(key, v);
}

document.getElementById('btn-random').addEventListener('click', () => {
  if (!hintGone) { hintGone = true; document.getElementById('hint').style.opacity = '0'; }
  initAudio(); ac.resume();

  // 保证至少 2 个声音激活，其余随机（30% 概率静音）
  const keys = SDEFS.map(d => d.key);
  const active = new Set();
  while (active.size < 2) active.add(keys[Math.floor(rnd() * keys.length)]);

  keys.forEach(key => {
    const vol = active.has(key)
      ? parseFloat((rndN(0.25, 0.85)).toFixed(2))   // 激活的随机音量
      : rnd() < 0.3 ? 0 : parseFloat((rndN(0.1, 0.55)).toFixed(2)); // 其余随机
    applyVolume(key, vol);
  });
});

document.getElementById('btn-clear').addEventListener('click', () => {
  SDEFS.forEach(d => applyVolume(d.key, 0));
});

// ════════════════════════════════════════════
//  渲染循环
// ════════════════════════════════════════════
function render() {
  ctx.fillStyle = 'rgba(250,250,248,0.13)';
  ctx.fillRect(0, 0, W, H);

  if (vols.fire > 0) driftFire();

  // 火焰环境光晕
  if (vols.fire > 0 && fX !== null) {
    const grd = ctx.createRadialGradient(fX, fY, 0, fX, fY, 110);
    grd.addColorStop(0, `rgba(255,100,0,${(vols.fire * 0.09).toFixed(3)})`);
    grd.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(fX - 110, fY - 110, 220, 220);
  }

  for (const d of SDEFS) tickPool(d.key, d.rate, d.maxP);

  if (gTick % 3 === 0) mkGrain();
  gTick++;
  if (gPat) {
    ctx.save(); ctx.globalAlpha = 0.048;
    ctx.fillStyle = gPat; ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  requestAnimationFrame(render);
}

ctx.fillStyle = '#FAFAF8';
ctx.fillRect(0, 0, W, H);
render();
</script>
